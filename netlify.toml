# =============================================================================
# Netlify build + deploy configuration for the coalition platform.
# =============================================================================

[build]
  base = "platform/"
  publish = "platform/dist/"
  command = "npm install && npm run build"
  # Functions live OUTSIDE platform/ so the Astro build doesn't try to bundle them.
  functions = "../netlify/functions/"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # Netlify Functions: TypeScript via esbuild bundler (default since 2023).
  node_bundler = "esbuild"
  directory = "netlify/functions"
  # Keep included_files small; Functions only need their own files.

# -----------------------------------------------------------------------------
# Pretty URLs for the confirmation flow.
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/api/confirm"
  to   = "/.netlify/functions/confirm-signature"
  status = 200
  force  = true

# Webhook target for Netlify Forms submissions is configured in the site
# Notification settings (Phase 4B), pointing at:
#   https://<site>/.netlify/functions/on-signature
# We don't pre-route /api/on-signature because the function only fires from
# Netlify's own webhook, not from public requests.

# -----------------------------------------------------------------------------
# Headers — security baseline.
# -----------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# -----------------------------------------------------------------------------
# Forms: Netlify auto-discovers forms via data-netlify="true" in the rendered
# HTML. We do NOT need to declare them here. Webhook targets are configured
# in the Netlify UI / via API during Phase 4B.
# -----------------------------------------------------------------------------
