# =============================================================================
# Netlify build + deploy configuration for the coalition platform.
# =============================================================================
#
# Repo layout reminder:
#   /package.json              — root deps (Functions: supabase-js, types)
#   /platform/package.json     — Astro frontend deps
#   /netlify/functions/        — Netlify Functions source
#   /platform/                 — Astro project (build output → platform/dist/)
#
# Build runs at repo ROOT (no `base` set) so:
#   - Netlify auto-runs `npm install` at root → installs Function deps
#   - Our `command` then installs Astro deps in platform/ and builds
#   - Functions bundler (esbuild) finds deps in root node_modules
#
# =============================================================================

[build]
  # No `base` — keep build at repo root so Functions can resolve root deps.
  publish = "platform/dist/"
  # Astro's @astrojs/netlify adapter (used for the SSR routes /letters/[token]
  # and /mla/[id]) writes its function bundle to platform/.netlify/v1/. Netlify
  # Build only auto-discovers .netlify/v1/ at the repo root, so we copy after
  # the Astro build. The repo-root .netlify/ is regenerated each build —
  # delete first to avoid stale function leftovers from a previous build.
  command = "npm install --prefix platform && (cd platform && npm run build) && rm -rf .netlify && cp -r platform/.netlify ."

[build.environment]
  NODE_VERSION = "20"
  # Astro requires NODE_ENV=production for production builds; Netlify sets this.
  # Keep devDependencies installed (needed for astro check + types).
  NPM_FLAGS = "--include=dev"

# -----------------------------------------------------------------------------
# Functions
# -----------------------------------------------------------------------------
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# -----------------------------------------------------------------------------
# Pretty URL for the confirmation flow.
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/api/confirm"
  to   = "/.netlify/functions/confirm-signature"
  status = 200
  force  = true

[[redirects]]
  from = "/api/withdraw"
  to   = "/.netlify/functions/withdraw"
  status = 200
  force  = true

# Webhook target for Netlify Forms submissions is configured at site level
# (POST /api/v1/hooks with event=submission_created), pointing at:
#   https://<site>/.netlify/functions/on-signature
# Already configured during Phase 4B.

# -----------------------------------------------------------------------------
# Headers — security baseline.
# -----------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
