# =============================================================================
# Netlify build + deploy configuration for the coalition platform.
# =============================================================================
#
# Repo layout reminder:
#   /package.json              — root deps (Functions: supabase-js, types)
#   /platform/package.json     — Astro frontend deps
#   /netlify/functions/        — Netlify Functions source
#   /platform/                 — Astro project (build output → platform/dist/)
#
# Build runs at repo ROOT (no `base` set) so:
#   - Netlify auto-runs `npm install` at root → installs Function deps
#   - Our `command` then installs Astro deps in platform/ and builds
#   - Functions bundler (esbuild) finds deps in root node_modules
#
# =============================================================================

[build]
  # No `base` — keep build at repo root so Functions can resolve root deps.
  publish = "platform/dist/"
  # Astro's @astrojs/netlify adapter (used for the SSR routes /letters/[token]
  # and /mla/[id]) writes its function bundle to platform/.netlify/v1/. Netlify
  # Build only auto-discovers .netlify/v1/ at the repo root, so we copy after
  # the Astro build. The repo-root .netlify/ is regenerated each build —
  # delete first to avoid stale function leftovers from a previous build.
  command = "npm install --prefix platform && (cd platform && npm run build) && rm -rf .netlify && cp -r platform/.netlify ."

[build.environment]
  NODE_VERSION = "20"
  # Astro requires NODE_ENV=production for production builds; Netlify sets this.
  # Keep devDependencies installed (needed for astro check + types).
  NPM_FLAGS = "--include=dev"

# -----------------------------------------------------------------------------
# Functions
# -----------------------------------------------------------------------------
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# -----------------------------------------------------------------------------
# Canonical-domain redirect. Netlify exposes the site at BOTH the custom
# domain (fundburnabykids.ca) and the default deploy alias
# (burnabykidsfirst-platform.netlify.app). When someone lands on the
# alias — typically from an old confirmation email rendered before the
# SITE_URL env var was fixed, or from sharing a Netlify deploy URL —
# every relative link on the page (header brand, /letters/<token>,
# /api/submit form action) stays on the alias subdomain, which is
# confusing and splits the campaign across two URLs in users' bookmarks.
# Force-301 every alias request to the primary custom domain.
# Belt + suspenders: also set fundburnabykids.ca as the primary domain
# in Netlify dashboard → Site settings → Domain management; that's the
# canonical fix, this redirect is the in-repo defense if someone ever
# unsets that.
# -----------------------------------------------------------------------------
[[redirects]]
  from = "https://burnabykidsfirst-platform.netlify.app/*"
  to   = "https://fundburnabykids.ca/:splat"
  status = 301
  force  = true

# -----------------------------------------------------------------------------
# Function aliases. force=true so /api/* always hits the Function even if
# a like-named static path exists. Why /api/submit handles BOTH the
# signature and pac-endorsement form POSTs (form-name dispatch) instead
# of using Netlify Forms: see the "Why we moved off Netlify Forms"
# comment in netlify/functions/submit.ts.
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/api/confirm"
  to   = "/.netlify/functions/confirm-signature"
  status = 200
  force  = true

[[redirects]]
  from = "/api/withdraw"
  to   = "/.netlify/functions/withdraw"
  status = 200
  force  = true

[[redirects]]
  from = "/api/submit"
  to   = "/.netlify/functions/submit"
  status = 200
  force  = true

[[redirects]]
  from = "/api/recover"
  to   = "/.netlify/functions/recover-signature"
  status = 200
  force  = true

[[redirects]]
  from = "/api/verify-pac"
  to   = "/.netlify/functions/verify-pac"
  status = 200
  force  = true

# -----------------------------------------------------------------------------
# Trailing-slash 301s for every static page.
#
# Why we need these explicitly: with `output: 'static'` + adapter, the
# @astrojs/netlify SSR function declares `path: '/*'` so it can serve
# /letters/<token> and friends. That makes Netlify route /confirm-thanks
# (no slash) to the function — which has no route for that path and
# 404s — instead of falling through to the static /confirm-thanks/index.html.
# `preferStatic: true` only helps when the requested path matches a literal
# file; /confirm-thanks doesn't, only /confirm-thanks/ does.
#
# Astro's `trailingSlash: 'always'` makes our own emitted links use the
# slashed form, but external POSTs (Netlify Forms 302 from the signature
# form, browser cache from before the trailing-slash deploy, manual links
# in old emails) still hit the unslashed URL. These rules permanently
# redirect those.
# -----------------------------------------------------------------------------
[[redirects]]
  from = "/confirm-thanks"
  to   = "/confirm-thanks/"
  status = 301
[[redirects]]
  from = "/zh/confirm-thanks"
  to   = "/zh/confirm-thanks/"
  status = 301
[[redirects]]
  from = "/confirmed"
  to   = "/confirmed/"
  status = 301
[[redirects]]
  from = "/zh/confirmed"
  to   = "/zh/confirmed/"
  status = 301
[[redirects]]
  from = "/confirm-failed"
  to   = "/confirm-failed/"
  status = 301
[[redirects]]
  from = "/zh/confirm-failed"
  to   = "/zh/confirm-failed/"
  status = 301
[[redirects]]
  from = "/methodology"
  to   = "/methodology/"
  status = 301
[[redirects]]
  from = "/zh/methodology"
  to   = "/zh/methodology/"
  status = 301
[[redirects]]
  from = "/privacy"
  to   = "/privacy/"
  status = 301
[[redirects]]
  from = "/zh/privacy"
  to   = "/zh/privacy/"
  status = 301
[[redirects]]
  from = "/pac-kit"
  to   = "/pac-kit/"
  status = 301
[[redirects]]
  from = "/zh/pac-kit"
  to   = "/zh/pac-kit/"
  status = 301
[[redirects]]
  from = "/withdrawn"
  to   = "/withdrawn/"
  status = 301
[[redirects]]
  from = "/zh/withdrawn"
  to   = "/zh/withdrawn/"
  status = 301
[[redirects]]
  from = "/withdraw-failed"
  to   = "/withdraw-failed/"
  status = 301
[[redirects]]
  from = "/zh/withdraw-failed"
  to   = "/zh/withdraw-failed/"
  status = 301
[[redirects]]
  from = "/pac-verified"
  to   = "/pac-verified/"
  status = 301
[[redirects]]
  from = "/zh/pac-verified"
  to   = "/zh/pac-verified/"
  status = 301
[[redirects]]
  from = "/press"
  to   = "/press/"
  status = 301

# Note: a `submission_created` webhook used to fire on-signature.ts when
# Netlify Forms intercepted the form POST. We've moved off Netlify Forms
# entirely (forms now POST to /api/submit). The old webhook can be left
# configured — it never fires in the new flow because no submission_created
# events are produced — or removed at the site level. submit.ts is the
# single source of truth for form persistence + email.

# -----------------------------------------------------------------------------
# Headers — security baseline.
# -----------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
