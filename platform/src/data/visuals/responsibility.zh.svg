    <text x="105" y="86" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="9.5" font-weight="600" fill="#C8531A">2022年薪资分级误读</text>
    <line x1="203" y1="55" x2="245" y2="55" stroke="#1A1A1A" stroke-width="2" marker-end="url(#p_arrow1z)"/>
    <rect x="250" y="20" width="190" height="70" rx="4" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
