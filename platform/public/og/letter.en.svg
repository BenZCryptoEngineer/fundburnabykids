<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Open Graph card for /letters/<token>. EN variant.
       Render is intentionally simple (no signer name, no per-letter detail)
       so a single static asset works for every signer and for WeChat /
       WhatsApp / Twitter / Facebook / LinkedIn previews. -->
  <rect width="1200" height="630" fill="#1C3F8F"/>

  <!-- Faint diagonal accent stripes top-right. -->
  <g opacity="0.08" fill="#FFFFFF">
    <rect x="900"  y="-50" width="60" height="800" transform="rotate(20 900 0)"/>
    <rect x="1020" y="-50" width="40" height="800" transform="rotate(20 1020 0)"/>
    <rect x="1100" y="-50" width="20" height="800" transform="rotate(20 1100 0)"/>
  </g>

  <!-- Verified badge -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="170" height="44" rx="22" fill="#FFFFFF"/>
    <circle cx="22" cy="22" r="9" fill="#1C3F8F"/>
    <path d="M 18 22 L 21 25 L 27 19" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="42" y="28" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1C3F8F" letter-spacing="0.04em">VERIFIED LETTER</text>
  </g>

  <!-- Headline -->
  <text x="80" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700" fill="#FFFFFF">A Burnaby parent</text>
  <text x="80" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700" fill="#FFFFFF">asked the Province</text>
  <text x="80" y="400" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700" fill="#FFFFFF">to fund SD41.</text>

  <!-- Sub-line -->
  <text x="80" y="475" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#FFFFFF" opacity="0.85">$9.4M arbitration · before May 27 budget vote</text>

  <!-- Bottom-left wordmark -->
  <text x="80" y="565" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" letter-spacing="0.05em">FUND BURNABY KIDS</text>
  <text x="80" y="595" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#FFFFFF" opacity="0.7">fundburnabykids.ca</text>
</svg>
