<svg viewBox="0 0 700 170" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <defs>
      <marker id="p_arrow1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1A1A1A"/></marker>
      <marker id="p_arrowBack" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#C8531A"/></marker>
    </defs>
    <rect x="10" y="20" width="190" height="70" rx="4" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="105" y="39" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="10.5" font-weight="700" fill="#1A1A1A">THE PROVINCE</text>
    <text x="105" y="55" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="8.5" fill="#555">via BCPSEA — the Province's</text>
    <text x="105" y="67" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="8.5" fill="#555">own bargaining agent</text>
    <text x="105" y="82" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="9" font-weight="600" fill="#C8531A">Misread salary grid, 2022</text>
    <line x1="203" y1="55" x2="245" y2="55" stroke="#1A1A1A" stroke-width="2" marker-end="url(#p_arrow1)"/>
    <rect x="250" y="20" width="190" height="70" rx="4" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <text x="345" y="39" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="10.5" font-weight="700" fill="#1A1A1A">2022 ARBITRATION</text>
    <text x="345" y="55" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="8.5" fill="#555">Orders SD41 to pay</text>
    <text x="345" y="67" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="8.5" fill="#555">800+ teachers retroactive</text>
    <text x="345" y="82" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="9" font-weight="600" fill="#1A1A1A">$9.4M by 2026-27</text>
    <line x1="443" y1="55" x2="485" y2="55" stroke="#1A1A1A" stroke-width="2" marker-end="url(#p_arrow1)"/>
    <rect x="490" y="20" width="200" height="70" rx="4" fill="#FFF3E0" stroke="#C8531A" stroke-width="2"/>
    <text x="590" y="39" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="10.5" font-weight="700" fill="#1A1A1A">SD41 STUDENTS PAY</text>
    <text x="590" y="55" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="8.5" fill="#555">Cuts to counsellors, EAs,</text>
    <text x="590" y="67" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="8.5" fill="#555">programs — to cover the gap</text>
    <text x="590" y="82" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="9" font-weight="600" fill="#C8531A">Borne by students</text>
    <path d="M 490 120 Q 300 155 105 120" fill="none" stroke="#C8531A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#p_arrowBack)"/>
    <rect x="175" y="108" width="350" height="42" rx="3" fill="#FFFFFF" stroke="#C8531A" stroke-width="1"/>
    <text x="350" y="124" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="9" font-weight="600" fill="#C8531A">BCPSEA PUBLICLY ADMITS:</text>
    <text x="350" y="138" text-anchor="middle" font-family="'Charter', Georgia, serif" font-size="9" font-style="italic" fill="#1A1A1A">"Would have been funded in 2022 if interpreted correctly."</text>
  </svg>
