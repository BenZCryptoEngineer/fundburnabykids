<svg viewBox="0 0 700 180" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <defs><marker id="p_tline" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1C3F8F"/></marker></defs>
    <line x1="30" y1="40" x2="670" y2="40" stroke="#1C3F8F" stroke-width="2" marker-end="url(#p_tline)"/>
    <circle cx="100" cy="40" r="6" fill="#1C3F8F"/>
    <text x="100" y="25" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="9" font-weight="700" fill="#1C3F8F">TODAY</text>
    <text x="100" y="15" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="7.5" fill="#666">Grades K–3</text>
    <text x="35" y="62" font-family="'Söhne', sans-serif" font-size="9.5" font-weight="600" fill="#1A1A1A">EA hours cut</text>
    <text x="35" y="75" font-family="'Söhne', sans-serif" font-size="8.5" fill="#444">Reading support:</text>
    <text x="35" y="87" font-family="'Söhne', sans-serif" font-size="8.5" fill="#444">3 hrs/wk → 1 hr/wk</text>
    <text x="35" y="103" font-family="'Söhne', sans-serif" font-size="8" fill="#666" font-style="italic">Early literacy gap</text>
    <text x="35" y="114" font-family="'Söhne', sans-serif" font-size="8" fill="#666" font-style="italic">begins to compound</text>
    <circle cx="330" cy="40" r="6" fill="#1C3F8F"/>
    <text x="330" y="25" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="9" font-weight="700" fill="#1C3F8F">YEARS 3–5</text>
    <text x="330" y="15" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="7.5" fill="#666">Grades 4–7</text>
    <text x="245" y="62" font-family="'Söhne', sans-serif" font-size="9.5" font-weight="600" fill="#1A1A1A">Counsellor time thin</text>
    <text x="245" y="75" font-family="'Söhne', sans-serif" font-size="8.5" fill="#444">Anxiety, learning-</text>
    <text x="245" y="87" font-family="'Söhne', sans-serif" font-size="8.5" fill="#444">difference flags missed</text>
    <text x="245" y="103" font-family="'Söhne', sans-serif" font-size="8" fill="#666" font-style="italic">What was a conversation</text>
    <text x="245" y="114" font-family="'Söhne', sans-serif" font-size="8" fill="#666" font-style="italic">becomes a crisis referral</text>
    <circle cx="570" cy="40" r="6" fill="#C8531A"/>
    <text x="570" y="25" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="9" font-weight="700" fill="#C8531A">YEAR 8+</text>
    <text x="570" y="15" text-anchor="middle" font-family="'Söhne', sans-serif" font-size="7.5" fill="#666">Grades 10–12</text>
    <text x="485" y="62" font-family="'Söhne', sans-serif" font-size="9.5" font-weight="600" fill="#C8531A">Application is thin</text>
    <text x="485" y="75" font-family="'Söhne', sans-serif" font-size="8.5" fill="#444">Advanced Learning gone,</text>
    <text x="485" y="87" font-family="'Söhne', sans-serif" font-size="8.5" fill="#444">electives narrowed,</text>
    <text x="485" y="99" font-family="'Söhne', sans-serif" font-size="8.5" fill="#444">counsellor access limited</text>
    <text x="485" y="115" font-family="'Söhne', sans-serif" font-size="8" fill="#C8531A" font-style="italic">UBC, scholarships,</text>
    <text x="485" y="126" font-family="'Söhne', sans-serif" font-size="8" fill="#C8531A" font-style="italic">specialty admissions:</text>
    <text x="485" y="137" font-family="'Söhne', sans-serif" font-size="8" fill="#C8531A" font-style="italic">real competitive disadvantage</text>
    <line x1="30" y1="160" x2="670" y2="160" stroke="#E5E0D5" stroke-width="1"/>
    <text x="350" y="175" text-anchor="middle" font-family="'Charter', Georgia, serif" font-size="9.5" font-style="italic" fill="#1A1A1A">A child entering Grade 2 today graduates Grade 12 in 2037. Every year without intervention compounds.</text>
  </svg>
