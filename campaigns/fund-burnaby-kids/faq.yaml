  - id: pac-joining
    q:
      en: "What does it mean when a PAC joins the coalition?"
      zh: "PAC加入联盟意味着什么？"
    a:
      en: |
        A PAC joining means the PAC has passed a motion at one of its meetings endorsing this campaign's ask (fund the $9.4M from the Contingencies Vote). The PAC's name and school appear publicly on this page. The PAC does not give up any independence, contribute any money, endorse any political party, or take on any legal liability. It is a public endorsement of a specific ask — nothing more.

        If you are a PAC chair and want to propose this at your next meeting, see the PAC Endorsement Kit — we've written the motion wording, the briefing, and an FAQ so you don't have to start from scratch.
      zh: |
        PAC加入意味着该PAC在一次会议上通过了支持此活动诉求的动议（从应急基金中资助$9.4M）。PAC的名称和学校会公开显示在此页面。PAC不放弃任何独立性、不出钱、不支持任何政党、不承担任何法律责任。这只是对一个具体诉求的公开背书——仅此而已。

        如果您是PAC主席，想在下次会议上提议此事，请查看PAC背书工具包——我们已写好动议措辞、简报和FAQ，您不用从零开始。

  - id: email-impact
    q:
      en: "Will sending an email really change anything?"
      zh: "发一封邮件真的能改变什么吗？"
    a:
      en: |
        Ministerial Correspondence Units sort incoming mail by postal code. When Burnaby MLAs receive dozens of identical-subject emails in the same week from their own constituents, that becomes a political signal that reaches caucus. The Province has already confirmed they are "actively engaged" on this file — that means the decision is open.

        The petition serves a different purpose: it creates a named collective object that can be printed, counted, and physically delivered. Emails are volume; petitions are weight. We need both.
      zh: |
        省府厅长通信单位按邮编分类处理邮件。当Burnaby的MLA在同一周内收到数十封来自本选区居民的相同主题邮件，这就成为一个会传达到党团的政治信号。省府已确认他们正在"积极处理"此事——这意味着决定尚未做出，仍在讨论中。

        请愿有不同作用：它形成一个可打印、可计数、可亲手递交的有名有姓的集体文件。邮件是数量，请愿是重量。两者都需要。

  - id: sign-without-email
    q:
      en: "Can I sign without sending an email?"
      zh: "我能只签名不发邮件吗？"
    a:
      en: "Yes. Uncheck the third box in the consent section before submitting. Your name will still appear on the petition. We recommend doing both — they reach different parts of government — but signing alone is fully valid."
      zh: "可以。提交前取消勾选同意区的第三个选项。您的名字仍会出现在请愿中。我们建议两者都做——它们触达政府的不同部分——但只签名也完全有效。"

  - id: casl
    q:
      en: "What about CASL — do your emails comply?"
      zh: "CASL呢——你们的邮件合规吗？"
    a:
      en: "CASL covers \"commercial electronic messages.\" Political advocacy emails fall outside that definition (see Industry Canada guidance and leading non-profit legal analysis). Even so, we follow CASL best practice: we obtain express opt-in consent for updates, every email has a one-click unsubscribe, every email identifies us with a physical address, and we honour unsubscribes within 10 days — well under the statutory requirement."
      zh: "CASL仅监管\"商业电子信息\"。政治倡导类邮件不属于该定义（见加拿大产业部指引及主要非营利组织的法律分析）。即便如此，我们仍遵循CASL最佳实践：明确获取订阅同意、每封邮件含一键退订、每封邮件包含实体地址、退订请求在10天内处理——远低于法定要求。"

  - id: who-sees-email
    q:
      en: "Who sees my email after I sign?"
      zh: "我签名后谁会看到我的邮件？"
    a:
      en: "When you click \"Open my pre-filled email,\" your email client (Apple Mail, Gmail, Outlook) opens with the recipients, subject, and body already filled in. You review and click send — from your own account. We never see the email leave your machine, and we never receive a copy. The Ministry and MLAs see the letter came from your personal address, which is what makes it a constituent letter."
      zh: "点击\"打开我的预填邮件\"时，您的邮件客户端（Apple Mail、Gmail、Outlook）会打开，收件人、主题和正文都已预填好。您审阅后点击发送——从您自己的账户。我们看不到邮件离开您的设备，也不会收到副本。省府和MLA看到的是来自您个人地址的邮件，这正是它成为\"选民邮件\"的关键。"
