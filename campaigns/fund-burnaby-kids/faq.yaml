faq:
  - id: privacy
    q:
      en: "Is my personal information safe?"
      zh: "我的个人信息安全吗？"
    a:
      en: |
        We take the minimum information needed and show even less publicly. Collected: first name, last name (or initial), email, school, grade, postal code, plus your three consent choices. Publicly displayed: first name + last initial + school + neighbourhood (derived from first 3 digits of postal code, never the full code). Your email and full postal code are never shown.

        Collection and use are governed by BC's Personal Information Protection Act (PIPA). You can request full deletion at any time by replying to any email from us. We retain consent records for three years per CRTC guidance, then delete them.

        We never sell, trade, or share your data with any third party. Hosting is in Canada.
      zh: |
        我们只收集必要的最少信息，公开显示的更少。收集内容：名字、姓氏（或首字母）、邮箱、学校、年级、邮编、以及您的三个同意选项。公开显示内容：名字+姓氏首字母+学校+社区（由邮编前3位推导，绝不显示完整邮编）。您的邮箱和完整邮编从不显示。

        信息收集与使用受BC省《个人信息保护法》(PIPA)保护。您可随时回复任何邮件要求完全删除。根据CRTC指引，同意记录保留3年后删除。

        我们从不出售、交易或与第三方共享您的数据。所有数据托管在加拿大。

  - id: who-runs-this
    q:
      en: "Who runs this? Is it DPAC or the school district?"
      zh: "这是谁在运营？DPAC还是学区？"
    a:
      en: |
        This site was founded and is operated by Ben Zhou, a Burnaby parent with two daughters and founder of Expeta Technologies (a Burnaby-based research company). Ben takes full public responsibility for this campaign, including strategy, content, and operations. See the About section for more.

        Fund Burnaby Kids is the current campaign of Burnaby Kids First — a parent-led coalition built to give Burnaby parents a durable voice on issues affecting local children. Fund Burnaby Kids is urgent and specific ($9.4M, by May 27). Burnaby Kids First is the longer-term coalition that will exist after this campaign ends.

        Burnaby DPAC (District Parent Advisory Council) is the elected institutional voice for parents across all 41 SD41 schools and has been organizing on this issue since April 2026 — their Parent Explainer is the most comprehensive single document on the case. This campaign supports DPAC's advocacy by adding signature collection and one-click constituent email on top of their broader work; we don't replace it. School-level PAC endorsements submitted through the form on this site appear in the Coalition section as they join (DPAC operates through its own institutional channel and is not on that list by design).

        No public funds are used. No political party is endorsed. No candidate is named.
      zh: |
        本网站由 Ben Zhou（周子颜） 创立并运营。他是一位Burnaby家长，有两个女儿，同时是Expeta Technologies（设在Burnaby的研究公司）的创始人。Ben对此活动承担完全的公开责任，包括策略、内容和运营。详见 About部分。

        Fund Burnaby Kids 是 Burnaby Kids First 联盟目前的运动——后者是一个家长主导的联盟，旨在为Burnaby家长在影响本地孩子的议题上提供持久的声音。Fund Burnaby Kids 是紧迫而具体的（$9.4M，5月27日之前）。Burnaby Kids First 是在本次运动结束后仍会存续的长期联盟。

        Burnaby DPAC（区家长咨询委员会，District Parent Advisory Council）是 SD41 全部 41 所学校选出的家长制度性代表机构，自 2026 年 4 月起就在为这件事组织行动 — 他们的 Parent Explainer 是目前关于本案最全面的单一文件。本活动以签名收集 + 一键发选民邮件的形式支持 DPAC 的倡导，并非取代他们的工作。透过本网站表单提交的学校层级 PAC endorsement 会显示在 Coalition 区段（DPAC 通过自己的制度性渠道运作，按设计不在这份名单上）。

        未使用任何公共资金。不支持任何政党。不提及任何候选人。
