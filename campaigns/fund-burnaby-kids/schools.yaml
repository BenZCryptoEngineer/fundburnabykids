# SD41 schools with their neighbourhood. Used by ActionForm to derive
# the public-display neighbourhood from school selection (more accurate
# than postal-code FSA, which crosses neighbourhood boundaries — see
# the Capitol Hill / Brentwood ambiguity in V5B).
#
# The mapping is shown to signers in a "?" popover on the form so they
# can verify and flag errors. If the wife / PAC / a signer points out a
# wrong row, edit here, push to main → site rebuilds with the new
# mapping. The same data is mirrored in netlify/functions/_shared.ts
# (SCHOOL_NEIGHBOURHOODS) so the on-signature Function can derive the
# neighbourhood from the submitted school name without trusting client
# data — keep the two in sync.

