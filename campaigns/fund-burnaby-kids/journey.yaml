# Cell-state taxonomy (matches Journey.astro legend):
#   have: currently funded; no documented cut for this grade
#   lost: cut already implemented in 2025-26 budget
#   risk: at risk IF $9.4M not funded — conditional, sourced to SD41 or DPAC analysis
#   gone: structurally eliminated for the grade band
#
# Every cell's `tip` carries a verbatim source citation (document + page).
# Risk cells are explicitly conditional — the tip names what triggers the
# risk and where the analysis comes from.

services:
  - id: ea
    name:
      en: "Classroom EA (support aide)"
      zh: "课堂助教 (EA)"
    note:
      en: "Without EA hours: your child's teacher splits attention 28 ways instead of having a second adult in the room. Students with IEPs feel it first. Then everyone feels it."
      zh: "没有EA：老师要把注意力分给28个孩子，而不是再有一个成年人在教室里。IEP学生先感受到。然后所有人感受到。"
    grades:
      K:    { state: risk, tip: { en: "EAs are uniquely vulnerable — no legal minimum staffing ratio. SD41 currently +25.33 EA FTE for 2026-27. If $9.4M not funded: per DPAC analysis, up to 259 positions could be cut, leaving 1 EA per 3 high-needs students. Source: SD41 Preliminary Budget Report 2026-27 p.15-16; DPAC Fact Sheet p.3.", zh: "EA无法定最低配置，最易被砍。SD41 2026-27 当前增加 25.33 EA FTE。如 $9.4M 不到位：DPAC 分析最多 259 个岗位可被砍，剩 1 个 EA 对 3 个高需求学生。来源：SD41 Preliminary Budget Report 2026-27 第15-16页；DPAC Fact Sheet 第3页。" } }
