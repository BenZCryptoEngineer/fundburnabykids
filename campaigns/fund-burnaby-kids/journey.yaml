      en: "Classroom EA (support aide)"
      zh: "课堂助教 (EA)"
    note:
      en: "Without EA hours: your child's teacher splits attention 28 ways instead of having a second adult in the room. Students with IEPs feel it first. Then everyone feels it."
      zh: "没有EA：老师要把注意力分给28个孩子，而不是再有一个成年人在教室里。IEP学生先感受到。然后所有人感受到。"
    grades:
