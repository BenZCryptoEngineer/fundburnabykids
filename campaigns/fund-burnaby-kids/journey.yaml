  - id: counsellor-elem
    name:
      en: "Elementary counsellor"
      zh: "小学辅导员"
    note:
      en: "When your Grade 3 starts having anxiety attacks at drop-off: you can talk to the teacher, but there's no one trained to actually help. The crisis becomes a referral. The referral has a 6-month wait."
      zh: "当你三年级的孩子早上送学时焦虑发作：你可以找老师谈，但没有受过专业训练的人能真正帮上忙。危机变成转介。转介排队 6 个月。"
    grades:
      K:    { state: have, tip: { en: "Currently weekly access. SD41 Preliminary Budget 2026-27 p.20: 2.76 FTE further counsellor reduction planned for 2026-27 (to bring district to collective-agreement floor). Recovery in 2027-28 from new bargaining additions. Source: SD41 Preliminary Budget Report 2026-27 p.20.", zh: "目前每周可见。SD41 Preliminary Budget 2026-27 第20页：2026-27 拟再减 2.76 FTE 辅导员（按工会协议最低）。2027-28 新协议下恢复。来源：SD41 Preliminary Budget Report 2026-27 第20页。" } }
