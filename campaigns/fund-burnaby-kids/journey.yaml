  - id: electives
    name:
      en: "High school electives"
      zh: "高中选修课"
    note:
      en: "Specialty sciences, arts streams, language options. The classes that make your child's transcript distinctive. When course allocations drop, electives go first. Your Grade 12's transcript starts looking like everyone else's."
      zh: "专业科学、艺术、语言。让你孩子成绩单与众不同的那些课。课时分配减少，选修课首先被砍。你十二年级孩子的成绩单开始看起来和其他人一样了。"
