  - id: band
    name:
      en: "Grade 7 band program"
      zh: "7年级乐队课"
    note:
      en: "1,200 students lost this in 2025-26. Feeder programs into high school music are now broken. If your child plays an instrument, the path forward got harder."
      zh: "2025-26 年 1,200 个学生失去了这个项目。高中音乐项目的生源通道被打断。如果你的孩子在学乐器，往后的路变难了。"
    grades:
      "7": { state: gone, tip: { en: "Eliminated 25-26 in all 41 elementary schools (1,200 students). Source: SD41 budget + CBC", zh: "2025-26 已在全部41所小学取消 (1,200学生)。来源: SD41预算 + CBC" } }

