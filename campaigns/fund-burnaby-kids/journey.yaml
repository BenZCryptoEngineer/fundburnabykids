  - id: counsellor-elem
    name:
      en: "Elementary counsellor"
      zh: "小学辅导员"
    note:
      en: "When your Grade 3 starts having anxiety attacks at drop-off: you can talk to the teacher, but there's no one trained to actually help. The crisis becomes a referral. The referral has a 6-month wait."
      zh: "当你三年级的孩子早上送学时焦虑发作：你可以找老师谈，但没有受过专业训练的人能真正帮上忙。危机变成转介。转介排队 6 个月。"
    grades:
      K:  { state: have, tip: { en: "Weekly access", zh: "每周可见" } }
