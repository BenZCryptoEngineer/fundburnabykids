  - id: counsellor-hs
    name:
      en: "High school counsellor"
      zh: "高中辅导员"
    note:
      en: "When your Grade 11 needs help with university applications: 1 counsellor, 400 students, 6-week wait. Your child's UBC application is thinner than it should be — not because they're less capable, but because no one had time."
      zh: "当你十一年级的孩子需要申请大学：1 个辅导员对 400 个学生，等 6 周。你孩子的 UBC 申请比应该的更单薄——不是因为他不够优秀，是因为没人有时间。"
    grades:
      "8":  { state: lost, tip: { en: "3.00 FTE secondary counsellor positions cut 25-26 ($385,113). Ratio now: 45 secondary counsellors for 27,000 students. Source: SD41 2025/26 Operating Budget Presentation p.13 (line 'Counselling 3.00 FTE / $385,113'); DPAC Fact Sheet p.2.", zh: "2025-26 削减 3.00 FTE 中学辅导员岗位 ($385,113)。当前比例：45 个中学辅导员对 27,000 学生。来源：SD41 2025/26 Operating Budget Presentation 第13页（'Counselling 3.00 FTE / $385,113'）；DPAC Fact Sheet 第2页。" } }
