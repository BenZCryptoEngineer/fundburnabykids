  - id: band
    name:
      en: "Grade 7 band program"
      zh: "7年级乐队课"
    note:
      en: "1,200 students lost this in 2025-26. Feeder programs into high school music are now broken. If your child plays an instrument, the path forward got harder."
      zh: "2025-26 年 1,200 个学生失去了这个项目。高中音乐项目的生源通道被打断。如果你的孩子在学乐器，往后的路变难了。"
    grades:
      "7": { state: gone, tip: { en: "Eliminated 25-26 in all 41 elementary schools. ~1,200 students affected. 4.30 FTE / $515,528 cut. Source: SD41 2025/26 Operating Budget Presentation p.13 (line 'Elementary Band 4.30 / $515,528'); CBC News 'Music education advocates sound alarm on cuts to B.C. school band programs'.", zh: "2025-26 在全部 41 所小学取消。约 1,200 学生受影响。砍 4.30 FTE / $515,528。来源：SD41 2025/26 Operating Budget Presentation 第13页（'Elementary Band 4.30 / $515,528'）；CBC News 'Music education advocates sound alarm on cuts to B.C. school band programs'。" } }

  - id: mandarin
    name:
      en: "Mandarin language program"
      zh: "中文课程"
    note:
      en: "Burnaby's Mandarin program was a competitive advantage for university applications and dual-language fluency. Already reduced in 2025-26 at the elementary level. Further cuts mean your child won't have this option even if they want it."
      zh: "本拿比的中文课程曾是申请大学和双语流利度的竞争优势。2025-26 已在小学层级削减。再砍下去，你的孩子即使想学也没得选。"
