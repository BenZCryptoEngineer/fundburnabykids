  - id: class-size
    name:
      en: "Class size & composition"
      zh: "班级规模与组成"
    note:
      en: "32 kids in a Grade 4 class instead of 24. Three students with IEPs, one with severe anxiety, one English language learner — and one teacher. Every child gets less of the teacher's attention. The students with the most needs get the least support."
      zh: "32 个孩子的四年级班级，而不是 24 个。三个 IEP 学生，一个严重焦虑，一个英语学习者——一个老师。每个孩子分到的老师注意力更少。需要最多的学生得到的支持最少。"
    grades:
      K:    { state: risk, tip: { en: "Currently meeting collective agreement maximums (K=20, 1-3=22, 4-7=30, 8-12=31). If $9.4M not funded and falls on teachers: per DPAC analysis, 72 teachers cut → +2 students/class, zero flexibility. Source: SD41 Preliminary Budget Report 2026-27 p.15-16; DPAC Fact Sheet p.3.", zh: "目前在工会协议上限内 (K=20, 1-3=22, 4-7=30, 8-12=31)。如 $9.4M 不到位且砍教师：DPAC 估算砍 72 教师 → 每班 +2 人，零弹性。来源：SD41 Preliminary Budget Report 2026-27 第15-16页；DPAC Fact Sheet 第3页。" } }
