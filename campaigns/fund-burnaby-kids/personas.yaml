visualizations_meta:
  cascade:
    kicker:
      en: "Your child's journey · K to 12"
      zh: "您孩子的学业之路 · K到12"
    head:
      en: "A cut today becomes a crisis at graduation."
      zh: "今天的削减，会在高中毕业时变成危机。"
    take:
      en: "This is not a one-year budget story. A $9.4M gap today is an invisible competitive disadvantage for Burnaby children applying to university in 2037. Cuts ratchet. They don't reverse. Scroll down to the journey visualization to see what specifically gets cut at your child's grade."
      zh: "这不是一年的预算问题。今天的$9.4M缺口，是2037年Burnaby孩子申请大学时看不见的竞争劣势。削减会累积，不会逆转。滚动到下方journey visualization，看具体您孩子所在年级会失去什么。"

  scale:
    kicker:
      en: "Last year vs. this year"
      zh: "去年 vs. 今年"
    head:
      en: "Last year's cuts were real. This year is 2.2× worse."
      zh: "去年的削减是真的。今年是2.2倍。"
    take:
      en: "The cuts your family felt last year — band, counsellors, Mandarin — came from a $4.2M gap. This year's unfunded liability is more than double. There is nothing \"low-impact\" left to cut."
      zh: "您家庭去年已经感受到的削减（乐队、辅导员、中文）来自$4.2M缺口。今年无资金缺口超过两倍。已经没有\"低影响\"的项目可以再砍了。"

  responsibility:
    kicker:
      en: "Responsibility flow"
      zh: "责任流程"
    head:
      en: "The Province made the mistake. Schools absorb the cost."
      zh: "省府犯的错，学校来承担。"
    take:
      en: "This isn't a Burnaby operational problem or a negotiation failure. BCPSEA — the Province's own agent — has admitted the error. The question for every PAC: do we absorb the Province's mistake quietly, or do we organize as a coalition?"
      zh: "这不是Burnaby的运营问题，也不是谈判失败。BCPSEA——省府自己的代表——已经承认错误。每个PAC面临的问题：我们是默默承担省府的错，还是作为联盟组织起来？"

  money:
    kicker:
      en: "Fiscal solvability"
      zh: "财政可行性"
    head:
      en: "The money already exists. Province calls it the Contingencies Vote."
      zh: "钱已经有了。省府叫它应急基金。"
    take:
      en: "The Province's own $5B Contingencies Vote — described by Treasury Board as covering exactly this kind of liability — is 500× larger than Burnaby's ask. This is not a funding-priorities question; it is a question of applying a fund to what it was designed for. Primary source: BC Budget 2026, Estimates Vote 50."
      zh: "省府自己的$5B应急基金——财政部自己描述为覆盖正是此类责任——是Burnaby请求金额的500倍。这不是拨款优先级问题，是把基金用于其设计用途的问题。原始资料：BC Budget 2026, Estimates Vote 50。"
