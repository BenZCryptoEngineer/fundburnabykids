founder:
  name: "Ben Zhou"
  role:
    en: "Burnaby parent · founder, Expeta Technologies"
    zh: "Burnaby家长，联盟创始人"
  avatar_text: "BZ"
  contact: "ben@fundburnabykids.ca"
  # `bio` is rendered via Astro's `set:html` in AboutSection.astro so we
  # can link "Expeta Technologies" inline below. Keep markup minimal —
  # only inline anchors. Block-level structure still comes from the
  # paragraph splitter in the component (blank-line delimited).
  bio:
    en: |
      Burnaby parent of two daughters at SD41 schools.

      I started this campaign after reading the BCPSEA arbitration ruling and the BC Budget 2026 documents in full. The funding mechanism exists in the Contingencies Vote; the application is the missing piece.

      Day job: founder of <a href="https://expeta.ca" target="_blank" rel="noopener noreferrer">Expeta Technologies</a>, a Burnaby-based research company studying how humans hold up under pressure. The same analytical habits applied to budget documents and arbitration filings.

      Available to brief PACs, journalists, or MLA offices on the documents directly.
    zh: |
      Burnaby家长，有两个女儿；Expeta Technologies（设在Burnaby的研究公司）创始人。在AI alignment和认知系统边界条件方面发表过学术工作——就是用同样的分析习惯读完了BC Budget 2026的预算文件和仲裁裁决。

      做这个网站的起因：我认真读完仲裁裁决后发现——省府自己的应急基金本就覆盖这种情况。公开的诉求不应该只是一封模板信。它应该是精确的。这就是这次活动试图做到的。
about_coalition:
  en: |
    Burnaby Kids First is the parent-led coalition behind this campaign. It exists to give Burnaby parents a durable, non-partisan voice on issues affecting local children — from school budgets today to whatever comes next: class sizes, seismic upgrades, mental health support, playground and transportation safety, after-school access.

    Campaigns come and go. The coalition persists. If you've signed this petition, you're already part of it.
  zh: |
    Burnaby Kids First 是这次行动背后的家长联盟。它存在的意义是让Burnaby家长在影响本地孩子的议题上有一个持久、无党派的声音——从今天的学校预算，到未来可能的任何议题：班级规模、抗震改造、心理健康支持、游乐场和交通安全、课后服务。

    运动会来会走。联盟会持续存在。如果您已经签署了这份请愿，您已经是其中一员。
