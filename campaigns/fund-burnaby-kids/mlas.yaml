# MLA registry — Fund Burnaby Kids campaign.
#
# Riding names follow the 2024 redistribution (post-2023 Electoral Boundaries
# Commission) which is in effect for the 43rd Parliament. The riding_id matches
# the Elections BC ED_ABBREVIATION (BNC/BNE/BNN/BNO/BNS) so the map view can
# join on it. Email + name verified against
# https://www.leg.bc.ca/contact-us/mla-contact-information on 2026-04-26.
#
# Note on Rohini Arora: the legislature uses her formal first name "Rohini"
# in official records and email; she campaigns publicly as "Reah Arora".
# We mirror the legislature's naming for outbound mail correctness.

mlas:
  # ---- Provincial cabinet recipients (always TO/CC the same two ministers) ----

  # NOTE on status after the 2026-04-30 SD41 Board funding announcement:
  # The Burnaby Board of Education publicly announced on 2026-04-30 that
  # the Province has agreed to fund the full arbitration cost. Board
  # Chair Schnider thanked Ministers Beare + Bailey by name and "local
  # MLAs who actively engaged" as a group. We do NOT use this as
  # evidence to individually upgrade any MLA's scorecard status,
  # because:
  #   (a) the schema's `committed` means the MLA publicly supports the
  #       ask, NOT that a third party characterized them as engaged;
  #   (b) for the five Burnaby MLAs, the Board's thanks named them as
  #       a group, never individually.
  # The outcome itself is communicated to readers via an outcome banner
  # at the top of the MlaScorecard component (sources the Board
  # announcement directly). Individual MLA rows will be upgraded only
  # when each MLA issues their own citable public statement.
  # `last_updated` is bumped to 2026-04-30 because we re-evaluated each
  # row that day; the conclusion in every row was unchanged.

  - id: beare
    name: "Hon. Lisa Beare"
    riding:
      en: "Minister of Education and Child Care"
      zh: "教育及儿童保育厅长"
    riding_id: null
    is_minister: true
    email: "ECC.Minister@gov.bc.ca"
    recipient_role: "to"
    status: "awaiting"
    status_evidence:
      quote: ""
      source_url: ""
      source_date: null
    last_updated: 2026-04-30

