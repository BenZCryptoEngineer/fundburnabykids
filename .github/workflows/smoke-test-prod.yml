# Production smoke test: hit the live site and verify every expected URL
# returns the right status + (where applicable) the right content marker.
#
# Catches the case CI alone can't catch: deploy succeeded but production
# is broken in a way only the live runtime exposes — DNS not resolving,
# SSR function not picked up, /confirm-thanks/ 404'ing because Netlify's
# function path overrides the static file, etc.
#
# Triggers:
#   - schedule: every 30 minutes during the campaign so a regression is
#     caught within a short window even when nobody is actively pushing.
#   - workflow_dispatch: manual button in the Actions UI for post-deploy
#     verification ("I just merged X, smoke-test the live site now").
#   - push to main: paired with the Netlify auto-deploy. Netlify build
#     takes ~3 min; this workflow waits 4 min then runs, giving the
#     deploy time to settle.

name: Smoke test (production)

on:
  schedule:
    # Every 6 hours instead of every 30 minutes. Tightening from 48
    # runs/day to 4 runs/day after the Netlify Starter site-pause
    # incident on 2026-04-28: smoke was hitting ~37 URLs per run + 2
    # POSTs through SSR functions, and across the day was a meaningful
    # share of the function-invocation / bandwidth quota. 6h is still
    # tight enough to catch a regression within a quarter-day; if the
    # campaign goes paid-tier (Pro), this can be moved back down.
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Netlify deploy to settle (push trigger only)
        if: github.event_name == 'push'
        run: sleep 240

      - name: Run smoke tests against production
        run: ./tests/smoke-test.sh https://fundburnabykids.ca

      # NOTE: tests/smoke-db.sh is intentionally NOT invoked here.
      # It INSERTs `_smoke_*` sentinel rows + DELETEs them on a trap.
      # During live campaign traffic those writes touch the same
      # `signatures` table that holds real signer PII, and the cron
      # would fire 4×/day + every push. If a schema regression check
      # is ever needed again, run smoke-db.sh manually with explicit
      # approval — do not re-wire it into automation without buy-in.
