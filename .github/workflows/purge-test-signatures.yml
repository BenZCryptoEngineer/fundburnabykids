# Manual purge of test/smoke signatures from production.
#
# Deliberately workflow_dispatch only — never on schedule, never on push.
# See CLAUDE.md "Test-data hygiene": auto-purging is too eager (it can
# nuke a deliberate debug row mid-inspection). Each run is an explicit
# user decision, with a dry_run gate so a typo can't destroy data.
#
# How to invoke:
#   - GH UI: Repo → Actions → "Purge test signatures" → "Run workflow"
#   - CLI:   gh workflow run purge-test-signatures.yml -f apply=true
#
# Default `apply=false` shows the preview only. Re-run with `apply=true`
# after eyeballing the matched rows.

name: Purge test signatures

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'list = read-only dump of all rows, sentinels = delete only test patterns, wipe-all = delete EVERY row'
        required: true
        type: choice
        default: list
        options:
          - list
          - sentinels
          - wipe-all
      apply:
        description: 'For sentinels / wipe-all: actually DELETE (default: dry-run preview)'
        required: true
        type: boolean
        default: false

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List all signatures (non-PII columns)
        if: ${{ inputs.mode == 'list' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
        run: ./scripts/purge-test-signatures.sh --list

      - name: Sentinel purge (dry-run preview)
        if: ${{ inputs.mode == 'sentinels' && inputs.apply == false }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
        run: ./scripts/purge-test-signatures.sh

      - name: Sentinel purge (--apply, deletes matched rows)
        if: ${{ inputs.mode == 'sentinels' && inputs.apply == true }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
        run: ./scripts/purge-test-signatures.sh --apply

      - name: Wipe ALL signatures (dry-run preview)
        if: ${{ inputs.mode == 'wipe-all' && inputs.apply == false }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
        run: ./scripts/purge-test-signatures.sh --wipe-all

      - name: Wipe ALL signatures (--apply, deletes EVERY row)
        if: ${{ inputs.mode == 'wipe-all' && inputs.apply == true }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
        run: ./scripts/purge-test-signatures.sh --wipe-all --apply
