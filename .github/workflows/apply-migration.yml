# Apply infrastructure/supabase-migrations.sql before Netlify deploys main.
#
# Why: confirm-signature.ts writes to columns the v0.2 migration adds. If
# Netlify deploys the new code before the migration is applied, every
# confirmation will 500. The migration is idempotent, so running it on
# every push to main (or whenever the SQL file changes) is safe.
#
# Why a separate workflow rather than running inside the Netlify build:
# Netlify Build doesn't have outbound access to the Supabase Management
# API in a controlled way, and we don't want to ship the SUPABASE_PAT as
# a Netlify env var. GH Actions runs first, completes, then Netlify
# auto-builds the same commit independently.
#
# Required GitHub Actions secrets:
#   SUPABASE_URL  — https://<ref>.supabase.co
#   SUPABASE_PAT  — Personal Access Token (Account → Access Tokens in
#                   the Supabase dashboard)
# Add via: Repo → Settings → Secrets and variables → Actions → New secret.

name: Apply Supabase migration

# Manual-only. The `push:` trigger that auto-applied migrations on any
# commit touching infrastructure/supabase-migrations.sql /
# scripts/apply-supabase-migration.sh / this workflow itself was removed
# during live campaign traffic — a misclick committing a SQL edit could
# silently re-run DROP INDEX / DROP CONSTRAINT / cron.unschedule
# against a table holding real signer PII. Migrations now require an
# explicit "Run workflow" press in the Actions UI, after the same
# operator reviews the SQL diff.
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply migration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
        run: ./scripts/apply-supabase-migration.sh
